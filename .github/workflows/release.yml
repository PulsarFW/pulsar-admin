name: Create release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump manifest version
        run: npm run .github/actions/bump-manifest-version.js
        env:
          TGT_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Bundle files
        run: |
          mkdir -p staging/pulsar-admin
          rsync -a --exclude='.github' --exclude='node_modules' --exclude='staging' . staging/pulsar-admin/
          cd staging && zip -r ../pulsar-admin.zip pulsar-admin/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "PULSAR-ADMIN ${{ github.ref_name }}"
          body: |
            ![Pulsar Framework](https://r2.fivemanage.com/GPYOH8Hq4GPyAY7czrgLe/pulsarbanner.png)

            ## PULSAR-ADMIN ${{ github.ref_name }}

            Staff administration panel and server management tools for Pulsar Framework.

            ### Installation
            1. Download `pulsar-admin.zip` below
            2. Extract into your server's `resources` folder
            3. Add `ensure pulsar-admin` to your `server.cfg`

            ---
            ![Pulsar Framework](https://img.shields.io/badge/Pulsar-Framework-7c3aed?style=flat-square)
            ![Built for FiveM](https://img.shields.io/badge/Built_for-FiveM-F40552?style=flat-square)
          files: pulsar-admin.zip
          prerelease: false
